plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace "cdn.example.cdn_chatroom"
    compileSdk 36

    defaultConfig {
        applicationId "cdn.example.cdn_chatroom"
        minSdk 24
        targetSdk 36
        versionCode 26
        versionName "3.6.0"
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            // Enable minification, shrinking, and obfuscation to reduce APK size
            // Target: APK under 40MB per ABI split
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"

            // ── APK SIZE FIX: Optimize for smaller builds ──
            // Strip debug symbols from native libraries (saves ~5-10MB)
            ndk {
                debugSymbolLevel "none"
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // Split by ABI to reduce APK size significantly
    // Generates separate APKs per CPU architecture instead of one fat APK
    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86_64"
            universalApk false
        }
    }

    // Optimize packaging — strip unnecessary meta files
    packagingOptions {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/license.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                'META-INF/notice.txt',
                'META-INF/ASL2.0',
                'META-INF/*.kotlin_module',
            ]
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
}
